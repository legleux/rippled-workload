services:
  workload:
    image: workload:latest
    build:
      dockerfile: Dockerfile
    container_name: workload
    hostname: workload
    ports: ["8000:8000"]
    init: true
    networks: { xrpl_net: {} }
    volumes:
      - ./testnet/accounts.json:/opt/antithesis/catalog/workload/testnet/accounts.json:ro

networks:
  xrpl_net:
    name: xrpl_net
    external: true
