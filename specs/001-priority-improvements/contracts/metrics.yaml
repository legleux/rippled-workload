openapi: 3.0.0
info:
  title: Metrics and State API
  version: 1.0.0
  description: Existing metrics endpoints (extended)

paths:
  /state/summary:
    get:
      summary: Get workload state summary
      tags: [Metrics]
      responses:
        '200':
          description: State summary
          content:
            application/json:
              schema:
                type: object
                properties:
                  total_transactions:
                    type: integer
                  by_state:
                    type: object

  /state/pending:
    get:
      summary: Get pending transactions
      tags: [Metrics]
      responses:
        '200':
          description: List of pending transactions
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object

  /state/validations:
    get:
      summary: Get validation history
      tags: [Metrics]
      responses:
        '200':
          description: Recent validations
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object

  /accounts:
    get:
      summary: Get all workload accounts
      tags: [Accounts]
      responses:
        '200':
          description: List of accounts
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object

  /accounts/{address}:
    get:
      summary: Get account details
      tags: [Accounts]
      parameters:
        - name: address
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Account details
          content:
            application/json:
              schema:
                type: object
