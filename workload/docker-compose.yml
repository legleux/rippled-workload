services:
  workload:
    image: workload:latest
    build:
      dockerfile: Dockerfile
    container_name: workload
    hostname: workload
    ports: ["8000:8000"]
    init: true
    networks: { xrpl_net: {} }
    volumes:
      - ./testnet/accounts.json:/workload/testnet/accounts.json:ro

    develop:
      watch:
        - action: rebuild
          path: ./workload/pyproject.toml
        - action: rebuild
          path: ./Dockerfile

networks:
  xrpl_net:
    external: true
