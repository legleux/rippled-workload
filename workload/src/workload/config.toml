######################################################
############## General defaults ######################
######################################################
funding_seed = false
# Default is genesis account. Must be specified with generated ledger.
[funding_account]
#address = "rHb9CJAWyB4rj91VRWn96DkukG4bwdtyTh"
#seed    = "snoPBrXtMeMyMHUVTgbuqAfg1SUTb"

[gateways]
names = [
    "all-crypto",
    "bit-bank",
    "coin-thang",
    "digi-bux",
    "flux-pay",
    "zen-trade",
]
number = 4
default_balance = 1_000_000_000_000000
require_auth = false
default_ripple = true

[users]
number = 100
default_balance = 50_000_000000

[amm]
xrp_chance = 0.50
trading_fee = 500
default_amm_token_deposit = 1_000
gateway_pools = 12
user_pools = 100
deposit_amount_xrp = "1000000000"
deposit_amount_iou = "500"

[currencies]
token_distribution = 1_000_000
codes = [
    "USD", "CNY", "BTC", "ETH", "GBP",
    "PNY", "DJF", "DKK", "GYD", "AUD",
    "KPW", "INR", "SOL", "TRX", "ADA",
    "XLM", "SUI", "LTC", "XMR", "DOT",
]

[currencies.rate]
USD = 1_000_000
BTC = 1_000_000_000

######################################################
########### Transaction context defaults #############
######################################################
[transactions]
# Maximum pending transactions per account (rippled queue limit)
# Higher values = more throughput but more risk of sequence errors
# Default: 10 (matches rippled's per-account queue limit) #TODO: Confirm in docs/source/Slack if this is still accurate
max_pending_per_account = 10

# Disable specific transaction types (all types in _BUILDERS are enabled by default)
disabled = [
    "Batch"
    # Batch now handled: sequences synced from ledger after validation/rejection/expiry
]

# Transaction type percentages for random selection (0.0 to 1.0)
# Types not listed share the remaining percentage evenly
[transactions.percentages]
Payment = 0.25
OfferCreate = 0.20
AMMDeposit = 0.15
AMMWithdraw = 0.10

[transactions.mptoken.issuance_create]
transfer_fee = 1000

[transactions.payment]
amount = 10_000_000

[transactions.trustset]
limit = 100_000_000_000_000000

[timeout]
overall = 6
startup = 600
initial_ledgers = 1

[genesis]
# Path to accounts.json from generate_ledger (address+seed pairs)
# Set to false or empty to disable genesis loading
accounts_json = "testnet/accounts.json"
currencies = ["USD", "CNY", "BTC", "ETH"]  # Currencies per gateway

[rippled]
docker = "rippled"
local = "localhost"
rpc_port = 5005
ws_port = 6006
timeout = 600

[logging]
version = 1
disable_existing_loggers = true

[logging.formatters.simple]
format = "[%(levelname)s] %(message)s"

[logging.formatters.simple_debug]
format = "[%(levelname)s] [%(module)s.%(funcName)s:%(lineno)d] %(message)s"

[logging.formatters.not_simple]
format = "[%(levelname)s] %(filename)s %(funcName)s %(message)s"

[logging.formatters.detailed]
format = "%(asctime)s [%(levelname)s] %(module)s|L%(lineno)d: %(message)s"
datefmt = "%Y-%m-%dT%H:%M:%S%z"

[logging.handlers.stdout]
class = "logging.StreamHandler"
level = "DEBUG"  # Changed from INFO to see debug messages
formatter = "simple_debug"
stream = "ext://sys.stdout"

[logging.handlers.stderr]
class = "logging.StreamHandler"
level = "ERROR"
formatter = "simple"
stream = "ext://sys.stdout"

[logging.handlers.file]
class = "logging.handlers.RotatingFileHandler"
level = "INFO"
formatter = "detailed"
maxBytes = 10000000
backupCount = 3

[logging.loggers.root]
level = "DEBUG"
handlers = ["stdout", "stderr", "file"]
