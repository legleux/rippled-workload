name: Publish

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    container: ghcr.io/astral-sh/uv:python3.14-trixie
    defaults:
      run:
        working-directory: workload
    steps:
      - uses: actions/checkout@v4
      - run: uv build
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: workload/dist/

